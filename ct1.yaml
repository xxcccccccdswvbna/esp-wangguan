esphome:
  name: ct1
  friendly_name: CT1 BLE Gateway

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_BT_ENABLED: y
      CONFIG_BT_BLE_ENABLED: y

logger:
  baud_rate: 0

wifi:
  ssid: "CC"
  password: "chen1122"
  fast_connect: true
  power_save_mode: none
  ap:
    ssid: "CT1 Fallback"
    password: "12345678"

# 1. 开启 HTTP 网页服务 (用于本地 OTA 升级)
web_server:
  port: 80
  version: 2

# 2. 开启 MQTT
mqtt:
  broker: "192.168.6.88"
  discovery: true
  on_message:
    - topic: "ct1/ble/send"
      then:
        - lambda: |-
            id(ct1_ble).send_hex(x);

# 3. 开启蓝牙代理 (被动模式，节省资源)
bluetooth_proxy:
  active: false

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: components

ble_gateway:
  id: ct1_ble

binary_sensor:
  - platform: template
    id: device_diningroom_led_state
    name: "Diningroom LED"
    device_class: light
  - platform: template
    id: device_diningroom_fan_state
    name: "Diningroom Fan State"
    device_class: running

sensor:
  - platform: template
    id: device_diningroom_brightness
    name: "Diningroom Brightness"
    unit_of_measurement: "%"
    accuracy_decimals: 0
  - platform: template
    id: device_diningroom_color_temp
    name: "Diningroom Color Temp"
    unit_of_measurement: "K"
    accuracy_decimals: 0
  - platform: template
    id: device_diningroom_fan_speed
    name: "Diningroom Fan Speed"
    accuracy_decimals: 0
  - platform: template
    id: device_diningroom_timer
    name: "Diningroom Timer"
    unit_of_measurement: "min"
    accuracy_decimals: 0

text_sensor:
  - platform: template
    id: device_diningroom_fan_direction
    name: "Diningroom Fan Direction"

light:
  - platform: ble_light
    id: device_diningroom_light_ctrl
    name: "Diningroom Light"
    ble_device_id: "light.diningroom"
    gateway: ct1_ble

fan:
  - platform: ble_fan
    id: device_diningroom_fan_ctrl
    name: "Diningroom Fan"
    ble_device_id: "fan.diningroom"
    gateway: ct1_ble

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false
  on_ble_advertise:
    - then:
        - lambda: |-
            auto datas = x.get_manufacturer_datas();
            for (auto &data : datas) {
                std::string he = "";
                for (uint8_t b : data.data) {
                    char buf[3];
                    sprintf(buf, "%02x", b);
                    he += buf;
                }
                
                if (he.length() < 40) continue; 
                if (he.substr(0, 4) != "8153") continue;

                // 提取并反转 MAC 地址 (位置 6:18)
                std::string mac_raw = he.substr(6, 12);
                std::string mac = "";
                for (int i = 10; i >= 0; i -= 2) {
                    mac += mac_raw.substr(i, 2);
                    if (i > 0) mac += ":";
                }

                // 解析通用状态数据
                int mode = strtol(he.substr(22, 2).c_str(), nullptr, 16);
                bool led_on = (mode & 0x01) != 0;
                bool fan_on = !(mode == 0x10 || mode == 0x11);
                bool fan_reverse = (mode & 0x20) != 0;
                
                float brightness_pct = (strtol(he.substr(28, 2).c_str(), nullptr, 16) / 255.0f) * 100.0f;
                float color_pct = strtol(he.substr(30, 2).c_str(), nullptr, 16) / 255.0f;
                float color_kelvin = 2700.0f + (6500.0f - 2700.0f) * color_pct;
                
                int timer_min = strtol(he.substr(32, 4).c_str(), nullptr, 16);
                int fan_speed = fan_on ? (strtol(he.substr(36, 2).c_str(), nullptr, 16) + 1) : 0;
                std::string fan_dir_str = fan_on ? (fan_reverse ? "Reverse" : "Forward") : "Off";

                // === 根据 MAC 地址路由到对应的设备 ===

                // 【Device: Diningroom】
                if (mac == "00:00:70:38:ab:cd") {
                    id(device_diningroom_led_state).publish_state(led_on);
                    id(device_diningroom_brightness).publish_state(brightness_pct);
                    id(device_diningroom_color_temp).publish_state(color_kelvin);
                    id(device_diningroom_fan_state).publish_state(fan_on);
                    id(device_diningroom_fan_speed).publish_state(fan_speed);
                    id(device_diningroom_fan_direction).publish_state(fan_dir_str);
                    id(device_diningroom_timer).publish_state(timer_min);
                }
                
                break; 
            }
