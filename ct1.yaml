esphome:
  name: ct1
  friendly_name: CT1 BLE Gateway

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_BT_ENABLED: y
      CONFIG_BT_BLE_ENABLED: y

logger:
  baud_rate: 0

wifi:
  ssid: "CC"
  password: "chen1122"
  fast_connect: true
  power_save_mode: none
  ap:
    ssid: "CT1 Fallback"
    password: "12345678"

api:
  reboot_timeout: 0s
ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: components

# ==========================================
# 👇 核心：自动引入生成的配置 (无需手动修改这里)
# ==========================================
!include auto_tracker.yaml
!include auto_entities.yaml

# ==========================================
# 网关实例
# ==========================================
ble_gateway:
  id: ct1_ble
