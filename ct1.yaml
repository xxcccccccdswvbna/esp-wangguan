esphome:
  name: ct1
  friendly_name: CT1 BLE Gateway


esp32:
  board: esp32dev
  flash_size: 4MB

  framework:
    type: esp-idf

    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y


logger:
  baud_rate: 0


wifi:
  ssid: "CC"
  password: "chen1122"

  fast_connect: true
  power_save_mode: none


web_server:
  port: 80


api:
  reboot_timeout: 0s


ota:
  - platform: esphome


mqtt:

  broker: "192.168.6.88"


  id: mqtt_client


external_components:

  - source:
      type: local
      path: components



ble_gateway:

  id: ble_gateway