# ==========================================
# 2. 核心：BLE 广播监听与 4 设备状态路由
# ==========================================
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false
  on_ble_advertise:
    - then:
        - lambda: |-
            auto datas = x.get_manufacturer_datas();
            for (auto &data : datas) {
                std::string he = "";
                for (uint8_t b : data.data) {
                    char buf[3];
                    sprintf(buf, "%02x", b);
                    he += buf;
                }
                
                if (he.length() < 40) continue; 
                if (he.substr(0, 4) != "8153") continue;

                // 提取并反转 MAC 地址 (位置 6:18)
                std::string mac_raw = he.substr(6, 12);
                std::string mac = "";
                for (int i = 10; i >= 0; i -= 2) {
                    mac += mac_raw.substr(i, 2);
                    if (i > 0) mac += ":";
                }

                // 解析通用状态数据
                int mode = strtol(he.substr(22, 2).c_str(), nullptr, 16);
                bool led_on = (mode & 0x01) != 0;
                bool fan_on = !(mode == 0x10 || mode == 0x11);
                bool fan_reverse = (mode & 0x20) != 0;
                
                float brightness_pct = (strtol(he.substr(28, 2).c_str(), nullptr, 16) / 255.0f) * 100.0f;
                float color_pct = strtol(he.substr(30, 2).c_str(), nullptr, 16) / 255.0f;
                float color_kelvin = 2700.0f + (6500.0f - 2700.0f) * color_pct;
                
                int timer_min = strtol(he.substr(32, 4).c_str(), nullptr, 16);
                int fan_speed = fan_on ? (strtol(he.substr(36, 2).c_str(), nullptr, 16) + 1) : 0;
                std::string fan_dir_str = fan_on ? (fan_reverse ? "Reverse" : "Forward") : "Off";

                // === 根据 MAC 地址路由到对应的 4 个设备 ===
                
                // 【Device 1】
                if (mac == "00:00:70:27:80:48") {
                    id(d1_led_state).publish_state(led_on);
                    id(d1_brightness).publish_state(brightness_pct);
                    id(d1_color_temp).publish_state(color_kelvin);
                    id(d1_fan_state).publish_state(fan_on);
                    id(d1_fan_speed).publish_state(fan_speed);
                    id(d1_fan_direction).publish_state(fan_dir_str);
                    id(d1_timer).publish_state(timer_min);
                } 
                // 【Device 2】
                else if (mac == "00:00:70:35:26:92") {
                    id(d2_led_state).publish_state(led_on);
                    id(d2_brightness).publish_state(brightness_pct);
                    id(d2_color_temp).publish_state(color_kelvin);
                    id(d2_fan_state).publish_state(fan_on);
                    id(d2_fan_speed).publish_state(fan_speed);
                    id(d2_fan_direction).publish_state(fan_dir_str);
                    id(d2_timer).publish_state(timer_min);
                } 
                // 【Device 3】
                else if (mac == "00:00:70:38:ab:cd") {
                    id(d3_led_state).publish_state(led_on);
                    id(d3_brightness).publish_state(brightness_pct);
                    id(d3_color_temp).publish_state(color_kelvin);
                    id(d3_fan_state).publish_state(fan_on);
                    id(d3_fan_speed).publish_state(fan_speed);
                    id(d3_fan_direction).publish_state(fan_dir_str);
                    id(d3_timer).publish_state(timer_min);
                } 
                // 【Device 4】 ⚠️ 注意：你提供的第4个MAC与第2个重复，此处使用占位符，请替换为真实MAC！
                else if (mac == "00:00:70:35:26:94") { 
                    id(d4_led_state).publish_state(led_on);
                    id(d4_brightness).publish_state(brightness_pct);
                    id(d4_color_temp).publish_state(color_kelvin);
                    id(d4_fan_state).publish_state(fan_on);
                    id(d4_fan_speed).publish_state(fan_speed);
                    id(d4_fan_direction).publish_state(fan_dir_str);
                    id(d4_timer).publish_state(timer_min);
                }
                
                break; 
            }

# ==========================================
# 3. 控制链路：BLE 网关与实体
# ==========================================
ble_gateway:
  id: ct1_ble

light:
  - platform: ble_light
    id: bedroom_light
    name: "Bedroom Light Control"
    ble_device_id: "light.room1"
    gateway: ct1_ble

fan:
  - platform: ble_fan
    id: bedroom_fan
    name: "Bedroom Fan Control"
    ble_device_id: "fan.room1"
    gateway: ct1_ble
