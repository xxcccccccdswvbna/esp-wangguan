name: Build and Release All Firmware & Configs

on:
  push:
    branches:
      - CT1-V2.1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 【新增】获取当前时间，并设置为环境变量，供后续步骤使用
      - name: Get current date and time
        id: datetime
        run: |
          # 生成用于 Tag 的紧凑时间格式 (例如: 20231027_153045)
          echo "TAG_TIME=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV
          # 生成用于标题的易读时间格式 (例如: 2023-10-27 15:30:45)
          echo "TITLE_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Generate Configs from JSON
        run: python3 generate_device_table.py

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

      - name: Compile CT1 (Lite)
        run: esphome compile ct1.yaml

      - name: Compile CT2 (Full)
        run: esphome compile ct2.yaml

      - name: Compile CT3 (Custom)
        run: esphome compile ct3.yaml

      - name: Compile CT4 (Pro)
        run: esphome compile ct4.yaml

      - name: Collect Firmware and Config Files
        run: |
          mkdir -p firmware/bin
          mkdir -p firmware/configs
          
          # 收集固件
          cp .esphome/build/ct1/.pioenvs/ct1/firmware.bin firmware/bin/ct1_firmware.bin
          cp .esphome/build/ct1/.pioenvs/ct1/firmware.factory.bin firmware/bin/ct1_firmware.factory.bin 2>/dev/null || true
          cp .esphome/build/ct2/.pioenvs/ct2/firmware.bin firmware/bin/ct2_firmware.bin
          cp .esphome/build/ct2/.pioenvs/ct2/firmware.factory.bin firmware/bin/ct2_firmware.factory.bin 2>/dev/null || true
          cp .esphome/build/ct3/.pioenvs/ct3/firmware.bin firmware/bin/ct3_firmware.bin
          cp .esphome/build/ct3/.pioenvs/ct3/firmware.factory.bin firmware/bin/ct3_firmware.factory.bin 2>/dev/null || true
          cp .esphome/build/ct4/.pioenvs/ct4/firmware.bin firmware/bin/ct4_firmware.bin
          cp .esphome/build/ct4/.pioenvs/ct4/firmware.factory.bin firmware/bin/ct4_firmware.factory.bin 2>/dev/null || true

          # 收集配置
          cp ct1.yaml ct2.yaml ct3.yaml ct4.yaml firmware/configs/
          cp components/ble_gateway/device_table.cpp firmware/configs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 【修改】Tag 名称加入紧凑时间，例如: v15-20231027_153045
          tag_name: v${{ github.run_number }}-${{ env.TAG_TIME }}
          
          # 【修改】Release 标题加入易读时间，例如: CT Gateway Build #15 (2023-10-27 15:30:45)
          name: CT Gateway Build #${{ github.run_number }} (${{ env.TITLE_TIME }})
          
          body: |
            🚀 ESP32 CT Gateway 自动编译发布
            
            **📦 包含内容：**
            - **CT1 (Lite)**: 精简保命版，Web OTA 稳定。
            - **CT2 (Full)**: 全功能版，含 MQTT/BT Proxy。
            - **CT3 (Custom)**: 定制扩展版。
            - **CT4 (Pro)**: 专属硬件版 (含物理按键/LED/系统传感器/Active BT Proxy)。
            
            > 💡 首次刷机请使用 `.factory.bin`。后续升级使用 `.bin` 进行 HTTP OTA。
          files: |
            firmware/bin/*.bin
            firmware/configs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
