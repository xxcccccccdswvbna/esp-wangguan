name: Build and Release Firmware (Matrix Parallel)

on:
  push:
    branches:
      - cloud4
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 🔥 核心修改：将 ct 改为 vt，与 Python 脚本中的 PROJECT_PREFIX 保持一致
        target: [vt1, vt2, vt3, vt4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------
      # 时间戳 + git 元数据
      # ------------------------------------------------------------------
      - name: Collect build metadata
        id: meta
        run: |
          echo "TAG_TIME=$(date +'%Y%m%d_%H%M%S')"        >> $GITHUB_ENV
          echo "TITLE_TIME=$(date +'%Y-%m-%d %H:%M:%S')"  >> $GITHUB_ENV
          echo "SHORT_SHA=$(git rev-parse --short HEAD)"  >> $GITHUB_ENV

          {
            echo 'COMMIT_MSG<<__EOF__'
            git log -1 --pretty=format:'%s%n%n%b'
            echo
            echo '__EOF__'
          } >> $GITHUB_ENV

          {
            echo 'CHANGED_FILES<<__EOF__'
            git diff --name-status HEAD~1 HEAD 2>/dev/null || echo "(initial commit)"
            echo '__EOF__'
          } >> $GITHUB_ENV

      - name: Generate Configs from JSON
        run: python3 generate_device_table.py

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

      # 🔥 这里会自动变成 esphome compile vt1.yaml, vt2.yaml...
      - name: Compile ${{ matrix.target }}
        run: esphome compile ${{ matrix.target }}.yaml

      # ------------------------------------------------------------------
      # 收集产物
      # ------------------------------------------------------------------
      - name: Collect Firmware for ${{ matrix.target }}
        if: success()
        run: |
          T=${{ matrix.target }}
          STAMP=${TAG_TIME}_${SHORT_SHA}
          SRC=".esphome/build/$T/.pioenvs/$T"
          OUT="firmware"
          mkdir -p "$OUT"

          cp "$SRC/firmware.bin"         "$OUT/${T}_${STAMP}.bin"
          if [ -f "$SRC/firmware.factory.bin" ]; then
            cp "$SRC/firmware.factory.bin" "$OUT/${T}_${STAMP}.factory.bin"
          fi
          cp "$T.yaml"                              "$OUT/${T}_${STAMP}.yaml"
          if [ -f components/ble_gateway/device_table.cpp ]; then
            cp components/ble_gateway/device_table.cpp \
               "$OUT/${T}_${STAMP}_device_table.cpp"
          fi

          echo "==== Collected artifacts ===="
          ls -lh "$OUT"

      # ------------------------------------------------------------------
      # 版本化 Release
      # ------------------------------------------------------------------
      - name: Create versioned Release for ${{ matrix.target }}
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          # 🔥 自动变成 vt1-v12-20260715...
          tag_name: ${{ matrix.target }}-v${{ github.run_number }}-${{ env.TAG_TIME }}-${{ env.SHORT_SHA }}
          name: "${{ matrix.target }} #${{ github.run_number }} · ${{ env.TITLE_TIME }} · ${{ env.SHORT_SHA }}"
          body: |
            🚀 **${{ matrix.target }}** · Build #${{ github.run_number }}

            **🕒 编译时间**: ${{ env.TITLE_TIME }}
            **🔖 Commit**: [`${{ env.SHORT_SHA }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **🌿 分支**: `${{ github.ref_name }}`

            ---

            **📝 本次提交**
            ```
            ${{ env.COMMIT_MSG }}
            ```

            **📂 触发本次编译的文件变更**
            ```
            ${{ env.CHANGED_FILES }}
            ```

            ---

            **📦 产物 (文件名已含时间戳 `${{ env.TAG_TIME }}_${{ env.SHORT_SHA }}`)**
            - `${{ matrix.target }}_${{ env.TAG_TIME }}_${{ env.SHORT_SHA }}.factory.bin` — 首次 USB 刷机
            - `${{ matrix.target }}_${{ env.TAG_TIME }}_${{ env.SHORT_SHA }}.bin` — HTTP OTA 升级
            - `${{ matrix.target }}_${{ env.TAG_TIME }}_${{ env.SHORT_SHA }}.yaml` — 本次编译使用的配置
            - `${{ matrix.target }}_${{ env.TAG_TIME }}_${{ env.SHORT_SHA }}_device_table.cpp` — 底层指令表

            > 💡 想拿最新版可直接访问 [`${{ matrix.target }}-latest`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ matrix.target }}-latest)
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 滚动 "latest" Release
      # ------------------------------------------------------------------
      - name: Update rolling "latest" Release for ${{ matrix.target }}
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          # 🔥 自动变成 vt1-latest, vt2-latest...
          tag_name: ${{ matrix.target }}-latest
          name: "${{ matrix.target }} · latest (${{ env.TITLE_TIME }})"
          body: |
            **${{ matrix.target }} 最新构建** — 由 workflow 自动覆盖

            - 编译时间: ${{ env.TITLE_TIME }}
            - Commit: `${{ env.SHORT_SHA }}`
            - Run: #${{ github.run_number }}
            - 详细版本: [${{ matrix.target }}-v${{ github.run_number }}-${{ env.TAG_TIME }}-${{ env.SHORT_SHA }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ matrix.target }}-v${{ github.run_number }}-${{ env.TAG_TIME }}-${{ env.SHORT_SHA }})
          files: firmware/*
          make_latest: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
