name: Build and Release Firmware (Matrix)

on:
  push:
    branches:
      - CT1-V2.1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Job 1: 统一运行 Python 脚本生成配置
  generate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate Configs
        run: python3 generate_device_table.py
      - name: Upload Configs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-configs
          path: |
            ct1.yaml
            ct2.yaml
            ct3.yaml
            ct4.yaml
            components/ble_gateway/device_table.cpp
          retention-days: 1

  # Job 2: 矩阵并行编译，独立发布
  build-and-release:
    needs: generate-configs
    runs-on: ubuntu-latest
    strategy:
      # 【核心】：fail-fast 设为 false，一个版本失败不会取消其他版本的编译！
      fail-fast: false 
      matrix:
        target: [ct1, ct2, ct3, ct4]
        
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Download Configs
        uses: actions/download-artifact@v4
        with:
          name: generated-configs

      - name: Install ESPHome
        run: pip install esphome

      - name: Compile ${{ matrix.target }}
        run: esphome compile ${{ matrix.target }}.yaml

      - name: Collect Firmware for ${{ matrix.target }}
        if: success() # 只有编译成功才收集
        run: |
          mkdir -p firmware
          cp .esphome/build/${{ matrix.target }}/.pioenvs/${{ matrix.target }}/firmware.bin firmware/${{ matrix.target }}_firmware.bin
          cp .esphome/build/${{ matrix.target }}/.pioenvs/${{ matrix.target }}/firmware.factory.bin firmware/${{ matrix.target }}_firmware.factory.bin 2>/dev/null || true
          cp ${{ matrix.target }}.yaml firmware/
          cp components/ble_gateway/device_table.cpp firmware/${{ matrix.target }}_device_table.cpp 2>/dev/null || true

      - name: Create Release for ${{ matrix.target }}
        if: success() # 只有编译成功才发布
        uses: softprops/action-gh-release@v2
        with:
          # 每个版本独立 Tag，例如 ct1-v12, ct2-v12
          tag_name: ${{ matrix.target }}-v${{ github.run_number }}
          name: ${{ matrix.target }} Firmware Build #${{ github.run_number }}
          body: |
            🚀 ESP32 ${{ matrix.target }} 自动编译发布
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
          files: |
            firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
