name: ESPHome Build

on:
  push:
    branches:
      - CT1-V2.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 👇 1. 升级 checkout 到 v4 (官方推荐)
      - uses: actions/checkout@v4

      # 👇 2. 运行 Python 脚本 (使用 python3 确保环境兼容)
      - name: Generate Device Table from JSON
        run: python3 generate_device_table.py

      # 👇 3. 升级 build-action 到 v4 (修复旧版 cache 被弃用的报错)
      - name: Build ESPHome firmware
        uses: esphome/build-action@v4
        with:
          yaml_file: ct1.yaml
