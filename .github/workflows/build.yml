name: Build CT1 Firmware

on:
  workflow_dispatch:

  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:


      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4



      # 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"



      # 安装 ESPHome
      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome



      # 编译 ESP32
      - name: Compile CT1
        run: |
          esphome compile ct1.yaml



      # 收集固件
      - name: Collect firmware files
        run: |

          mkdir -p firmware


          find .esphome/build/ct1 \
          -type f \
          \( \
            -name "*.bin" \
            -o -name "*.elf" \
            -o -name "*.map" \
          \) \
          -exec cp {} firmware/ \;



          echo "===== Firmware files ====="

          ls -lh firmware



      # 上传固件
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4

        with:

          name: CT1-firmware

          path: firmware/