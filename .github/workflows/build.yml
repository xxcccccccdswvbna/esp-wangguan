name: Build ESPHome CT1

on:
  workflow_dispatch: # 允许在 GitHub 界面手动点击按钮触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          python -m pip install esphome

      - name: Compile CT1
        run: |
          esphome compile ct1.yaml

      - name: Upload firmware to Artifacts
        # 将纯 .bin 文件上传到 Artifacts 供临时下载
        uses: actions/upload-artifact@v4
        with:
          name: ct1-firmware
          path: .esphome/build/ct1/.pioenvs/ct1/firmware.bin

      - name: Create GitHub Release
        # 自动创建一个 Release，并将 .bin 文件作为附件发布
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: CT1 Firmware v${{ github.run_number }}
          files: .esphome/build/ct1/.pioenvs/ct1/firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
